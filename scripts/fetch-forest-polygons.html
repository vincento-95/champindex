    const WFS_BASE = 'https://data.geopf.fr/wfs/ows';
    const RADIUS = 0.04; // ~4.5km en degrés
    let allFeatures = [];
    let statusEl, progressBar;

    function log(msg) {
      statusEl.textContent += msg + '\n';
      statusEl.scrollTop = statusEl.scrollHeight;
    }

    async function fetchForestPolygons(lat, lon, name) {
      const bbox = `${lon - RADIUS},${lat - RADIUS},${lon + RADIUS},${lat + RADIUS},EPSG:4326`;
      const url = `${WFS_BASE}?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature` +
        `&TYPENAME=LANDCOVER.FORESTINVENTORY.V2:formation_vegetale` +
        `&OUTPUTFORMAT=application/json` +
        `&SRSNAME=EPSG:4326` +
        `&BBOX=${bbox}` +
        `&COUNT=200`;

      const resp = await fetch(url);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();

      // Filtrer : garder uniquement les forêts (pas les prairies, cultures, etc.)
      const forests = (data.features || []).filter(f => {
        const tfv = (f.properties?.tfv || '').toLowerCase();
        return tfv.includes('forêt') || tfv.includes('peupleraie') || tfv.includes('bois');
      });

      // Ajouter le nom du lieu comme propriété
      for (const f of forests) {
        f.properties._locationName = name;
        f.properties._locationId = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
      }

      return forests;
    }

    async function start() {
      statusEl = document.getElementById('status');
      progressBar = document.getElementById('progressBar');
      document.getElementById('startBtn').disabled = true;
      allFeatures = [];
      statusEl.textContent = '';

      log('Début de la génération...');
      log(`${LOCATIONS.length} lieux à traiter\n`);

      for (let i = 0; i < LOCATIONS.length; i++) {
        const loc = LOCATIONS[i];
        const pct = Math.round((i / LOCATIONS.length) * 100);
        progressBar.style.width = pct + '%';

        try {
          const features = await fetchForestPolygons(loc.lat, loc.lng, loc.name);
          allFeatures.push(...features);
          log(`✅ ${i + 1}/${LOCATIONS.length} — ${loc.name} : ${features.length} polygones`);
        } catch (e) {
          log(`❌ ${i + 1}/${LOCATIONS.length} — ${loc.name} : ${e.message}`);
        }

        // Throttle : 200ms entre chaque requête
        if (i < LOCATIONS.length - 1) {
          await new Promise(r => setTimeout(r, 200));
        }
      }

      progressBar.style.width = '100%';
      log(`\n✅ Terminé ! ${allFeatures.length} polygones forestiers récupérés.`);
      log(`Cliquez "Télécharger le GeoJSON" pour sauvegarder.`);
      document.getElementById('downloadBtn').disabled = false;
    }

    function download() {
      const geojson = {
        type: 'FeatureCollection',
        features: allFeatures,
      };

      const blob = new Blob([JSON.stringify(geojson)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'forest-polygons.json';
      a.click();
      URL.revokeObjectURL(url);
      log('\n📥 Fichier téléchargé : forest-polygons.json');
    }
