<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>DataStore Snapshot - Heatmap France</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="map-styling">
    /* Base map styles for a dark theme aesthetic */
    .map-container {
      background-color: #0a0a0a;
      background-image: 
        radial-gradient(circle at 50% 50%, rgba(30, 41, 59, 1) 0%, rgba(10, 10, 10, 1) 100%);
      position: relative;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* Simulated France shape and heatmap overlay */
    .france-outline {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      height: 70%;
      opacity: 0.8;
      filter: blur(40px);
      background: radial-gradient(circle at 30% 20%, #ef4444 10%, transparent 40%),
                  radial-gradient(circle at 60% 50%, #f97316 15%, transparent 50%),
                  radial-gradient(circle at 40% 70%, #eab308 20%, transparent 60%),
                  radial-gradient(circle at 80% 80%, #3b82f6 25%, transparent 70%);
    }

    /* Custom scrollbar for the bottom sheet */
    .bottom-sheet::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body class="bg-black text-white font-sans overflow-hidden">
<!-- BEGIN: LoadingProgressBar -->
<div class="fixed top-0 left-0 w-full z-50 bg-gray-900 h-1">
<div class="bg-green-500 h-full transition-all duration-500" data-purpose="loading-progress" style="width: 31%"></div>
<div class="absolute top-1 left-1/2 -translate-x-1/2 text-[10px] font-bold text-gray-400 uppercase tracking-widest bg-black/50 px-2 py-0.5 rounded-b">
      2400/7766 forêts · 31%
    </div>
</div>
<!-- END: LoadingProgressBar -->
<!-- BEGIN: MainMapInterface -->
<main class="map-container flex flex-col">
<!-- Heatmap background simulation -->
<div class="france-outline"></div>
<!-- Floating Markers -->
<div class="absolute top-1/2 left-1/3 -translate-y-10 flex flex-col items-center">
<span class="text-2xl drop-shadow-md">🌲</span>
<div class="w-1 h-1 bg-white rounded-full"></div>
</div>
<div class="absolute top-[40%] left-[60%] flex flex-col items-center">
<span class="text-2xl drop-shadow-md">🌊</span>
<div class="w-1 h-1 bg-white rounded-full"></div>
</div>
<div class="absolute top-[65%] left-[45%] flex flex-col items-center">
<span class="text-2xl drop-shadow-md">🌾</span>
<div class="w-1 h-1 bg-white rounded-full"></div>
</div>
<!-- Top Left Controls -->
<div class="absolute top-8 left-4 flex flex-col gap-3 z-10">
<button class="bg-zinc-900/90 backdrop-blur-md px-4 py-2 rounded-full border border-white/10 flex items-center gap-2 text-sm font-medium shadow-lg">
<span>←</span> Retour
      </button>
<button class="bg-zinc-900/90 backdrop-blur-md p-3 rounded-full border border-white/10 shadow-lg w-fit">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<button class="bg-green-500/20 text-green-400 border border-green-500/50 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider flex items-center gap-2 shadow-lg backdrop-blur-md">
<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
        Spots ON
      </button>
</div>
<!-- Top Right Stats -->
<div class="absolute top-8 right-4 text-right z-10">
<div class="bg-zinc-900/90 backdrop-blur-md px-4 py-2 rounded-xl border border-white/10 shadow-lg">
<div class="text-[10px] uppercase text-zinc-400 font-bold tracking-tighter">🌡️ Carte de France</div>
<div class="text-lg font-bold">7,766 <span class="text-xs text-zinc-500">forêts</span></div>
</div>
</div>
<!-- Bottom Left Legend -->
<div class="absolute bottom-64 left-4 z-10 bg-zinc-900/90 backdrop-blur-md p-3 rounded-xl border border-white/10 shadow-xl w-40">
<div class="text-[10px] font-bold uppercase mb-2 text-zinc-400">Probabilité champignons</div>
<div class="flex h-2 rounded-full overflow-hidden mb-1">
<div class="flex-1 bg-blue-600"></div>
<div class="flex-1 bg-blue-400"></div>
<div class="flex-1 bg-yellow-400"></div>
<div class="flex-1 bg-orange-400"></div>
<div class="flex-1 bg-orange-600"></div>
<div class="flex-1 bg-red-600"></div>
</div>
<div class="flex justify-between text-[8px] font-bold text-zinc-500">
<span>LOW</span>
<span>JACKPOT</span>
</div>
</div>
<!-- BEGIN: BottomSheet -->
<div class="absolute bottom-0 left-0 w-full bg-zinc-950 border-t border-white/10 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-20 pb-8 pt-2 px-6 overflow-y-auto max-h-[55vh] bottom-sheet">
<!-- Handle for sliding feel -->
<div class="w-12 h-1 bg-zinc-800 rounded-full mx-auto mb-6"></div>
<!-- Header Information -->
<div class="flex justify-between items-start mb-6">
<div>
<h2 class="text-2xl font-bold">Forêt de Fontainebleau</h2>
<div class="flex items-center gap-2 mt-1">
<span class="bg-zinc-800 text-zinc-400 text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wide">Seine-et-Marne</span>
<span class="text-zinc-500 text-xs italic">Feuillus &amp; Résineux</span>
</div>
</div>
<div class="bg-orange-500/10 border border-orange-500/50 rounded-2xl w-14 h-14 flex items-center justify-center">
<span class="text-2xl font-black text-orange-500">72</span>
</div>
</div>
<!-- Weather Stats Grid -->
<div class="grid grid-cols-3 gap-3 mb-8">
<div class="bg-zinc-900/50 border border-white/5 p-3 rounded-2xl text-center">
<div class="text-[10px] text-zinc-500 uppercase font-bold mb-1">Pluie</div>
<div class="text-lg font-bold">12mm</div>
</div>
<div class="bg-zinc-900/50 border border-white/5 p-3 rounded-2xl text-center">
<div class="text-[10px] text-zinc-500 uppercase font-bold mb-1">Temp</div>
<div class="text-lg font-bold">14°C</div>
</div>
<div class="bg-zinc-900/50 border border-white/5 p-3 rounded-2xl text-center">
<div class="text-[10px] text-zinc-500 uppercase font-bold mb-1">Sol</div>
<div class="text-lg font-bold text-blue-400">85%</div>
</div>
</div>
<!-- Alert Dots / Indicators -->
<div class="flex gap-2 mb-8 items-center">
<div class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
<div class="w-2 h-2 rounded-full bg-orange-500"></div>
<div class="w-2 h-2 rounded-full bg-zinc-800"></div>
<span class="text-[10px] text-zinc-400 ml-2 font-medium">Conditions d'humidité optimales détectées</span>
</div>
<!-- Probability Bars -->
<div class="space-y-4">
<div data-purpose="species-row">
<div class="flex justify-between text-xs font-bold mb-1.5">
<span>Cèpes de Bordeaux</span>
<span class="text-orange-400">82%</span>
</div>
<div class="h-1.5 bg-zinc-900 rounded-full overflow-hidden">
<div class="h-full bg-orange-500 rounded-full" style="width: 82%"></div>
</div>
</div>
<div data-purpose="species-row">
<div class="flex justify-between text-xs font-bold mb-1.5">
<span>Chanterelles</span>
<span class="text-yellow-400">45%</span>
</div>
<div class="h-1.5 bg-zinc-900 rounded-full overflow-hidden">
<div class="h-full bg-yellow-400 rounded-full" style="width: 45%"></div>
</div>
</div>
<div data-purpose="species-row">
<div class="flex justify-between text-xs font-bold mb-1.5">
<span>Trompettes de la mort</span>
<span class="text-zinc-500">12%</span>
</div>
<div class="h-1.5 bg-zinc-900 rounded-full overflow-hidden">
<div class="h-full bg-zinc-600 rounded-full" style="width: 12%"></div>
</div>
</div>
</div>
</div>
<!-- END: BottomSheet -->
</main>
<!-- END: MainMapInterface -->
</body></html>
